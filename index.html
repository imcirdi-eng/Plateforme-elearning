<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Skillyam — Plateforme d'entraînement</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root{
    --bg:#fff5fb; --bg2:#fdeef8; --card:#ffffff; --card2:#fdf0f9;
    --accent:#ff2e9a; --accent2:#ff7ec9; --ok:#1fb98a; --warn:#f59f3c; --err:#ff5c8a;
    --text:#4a2a52; --muted:#a886b8; --line:#f6d9ee; --radius:20px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Quicksand",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-weight:500;
    background:radial-gradient(1100px 650px at 85% -12%,#ffd0ea 0%,#f4e2ff 42%,#fff5fb 100%) fixed;color:var(--text);min-height:100vh}
  h1,h2,h3,.brand{font-family:"Poppins","Quicksand",sans-serif}
  .wrap{max-width:960px;margin:0 auto;padding:24px}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:21px;letter-spacing:.3px}
  .logo{position:relative;width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:grid;place-items:center;font-weight:900;color:#fff;font-size:19px;box-shadow:0 6px 18px rgba(255,46,154,.35)}
  .logo .spark{position:absolute;top:-7px;right:-7px;font-size:15px;color:#ffd36e;filter:drop-shadow(0 1px 2px rgba(0,0,0,.15))}
  .top-actions{display:flex;align-items:center;gap:10px}
  .lang{display:flex;background:var(--card);border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .lang button{background:none;border:none;color:var(--muted);padding:7px 12px;cursor:pointer;font-weight:700;font-size:13px}
  .lang button.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
  .who{font-size:13px;color:var(--muted)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:24px;margin-bottom:18px;
    box-shadow:0 14px 44px rgba(214,120,190,.18)}
  h1{font-size:26px;margin-bottom:8px}
  h2{font-size:20px;margin-bottom:6px}
  h3{font-size:16px;margin-bottom:6px}
  p.sub{color:var(--muted);margin-bottom:18px;line-height:1.5}
  label{display:block;font-size:13px;color:var(--muted);margin:12px 0 6px}
  input{width:100%;padding:12px 14px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;color:var(--text);font-size:15px;font-family:inherit}
  input:focus{outline:none;border-color:var(--accent)}
  button.btn{appearance:none;border:none;cursor:pointer;font-weight:700;font-size:15px;padding:12px 18px;border-radius:12px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;transition:.15s transform;font-family:inherit}
  button.btn:hover{transform:translateY(-1px)}
  button.btn.full{width:100%;margin-top:18px}
  button.btn.sm{padding:10px 14px;font-size:14px}
  button.ghost{background:var(--card2);color:var(--text);border:1px solid var(--line)}
  .link{color:var(--accent);cursor:pointer;font-weight:700}
  .muted{color:var(--muted)}
  .msg{font-size:13px;margin-top:10px;min-height:16px}
  .msg.err{color:var(--err)} .msg.ok{color:var(--ok)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .domain{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:18px;cursor:pointer;transition:.15s;position:relative}
  .domain:hover{border-color:var(--accent);transform:translateY(-2px)}
  .domain .ic{font-size:26px;margin-bottom:10px}
  .domain h3{margin-bottom:4px}
  .domain small{color:var(--muted)}
  .badge{display:inline-block;font-size:11px;font-weight:800;padding:4px 9px;border-radius:999px;margin-top:10px}
  .badge.none{background:#f7e3f2;color:var(--muted)}
  .badge.deb{background:rgba(245,159,60,.16);color:var(--warn)}
  .badge.int{background:rgba(31,185,138,.16);color:var(--ok)}
  .badge.tag{background:rgba(255,46,154,.12);color:var(--accent);margin:0}
  .bar{height:7px;background:var(--bg2);border-radius:999px;overflow:hidden;margin-top:12px}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .q{margin-bottom:18px}
  .q .opt{display:block;width:100%;text-align:left;background:var(--bg2);border:1px solid var(--line);border-radius:12px;
    padding:13px 15px;margin-top:9px;cursor:pointer;color:var(--text);font-size:15px;transition:.12s;font-family:inherit}
  .q .opt:hover{border-color:var(--accent)}
  .q .opt.sel{border-color:var(--accent);background:rgba(255,46,154,.12)}
  .q .opt.correct{border-color:var(--ok);background:rgba(31,185,138,.14)}
  .q .opt.wrong{border-color:var(--err);background:rgba(255,92,138,.14)}
  .fillrow{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
  .fillrow input{flex:1;min-width:160px}
  .fillrow input.good{border-color:var(--ok);background:rgba(31,185,138,.10)}
  .fillrow input.bad{border-color:var(--err);background:rgba(255,92,138,.10)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .spacer{flex:1}
  .pill{font-size:12px;font-weight:700;color:var(--muted);background:var(--bg2);padding:6px 11px;border-radius:999px;border:1px solid var(--line)}
  .lesson{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:16px;margin:12px 0;line-height:1.6}
  .lesson code{background:#fff;border:1px solid var(--line);border-radius:6px;padding:1px 6px;font-size:13px;color:var(--accent)}
  .passage{background:linear-gradient(180deg,#fff,#fdf2fa);border:1px dashed var(--accent);border-radius:12px;padding:16px;margin:12px 0;line-height:1.6;font-style:italic}
  .passage .ptag{font-style:normal;font-weight:800;font-size:12px;color:var(--accent);display:block;margin-bottom:6px}
  .module{border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;background:var(--card2)}
  .module .mhead{display:flex;align-items:center;gap:10px;cursor:pointer}
  .check{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;font-size:12px;flex-shrink:0}
  .check.done{background:var(--ok);border-color:var(--ok);color:#06231a}
  .result-big{text-align:center;padding:14px 0}
  .result-big .score{font-size:46px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .hidden{display:none!important}
  .expl{font-size:13px;color:var(--muted);margin-top:8px;padding-left:10px;border-left:3px solid var(--accent)}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:18px 0 30px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--line);
    padding:12px 18px;border-radius:12px;font-size:14px;opacity:0;transition:.3s;pointer-events:none;box-shadow:0 8px 24px rgba(214,120,190,.25)}
  .toast.show{opacity:1}
</style>
</head>

/* ====== LIEN EXCEPTIONNEL DE RÉINITIALISATION ======
   Donne aux personnes bloquées : l'URL de ton site suivie de  ?reset=RESET-2026
   (ex. https://ton-site.netlify.app/?reset=RESET-2026). Change le code si tu veux. */
const RESET_LINK_CODE = "RESET-2026";
function isSpecialReset(){
  try{
    const p=new URLSearchParams(location.search);
    if(p.get('reset')===RESET_LINK_CODE) return true;
    const hp=new URLSearchParams((location.hash||'').replace(/^#/,''));
    if(hp.get('reset')===RESET_LINK_CODE) return true;
  }catch(e){}
  return false;
}

       lesson:{fr:"Expressions utiles : <b>to set up a meeting</b> (organiser), <b>agenda</b> (ordre du jour), <b>minutes</b> (compte-rendu), <b>action items</b> (tâches), <b>to follow up</b> (faire le suivi).",
               en:"Useful phrases: <b>to set up a meeting</b>, <b>agenda</b>, <b>minutes</b> (the written record), <b>action items</b>, <b>to follow up</b>."},
       ex:[{type:'mcq',q:{fr:"« The minutes » d'une réunion sont :",en:"The “minutes” of a meeting are:"},o:["Sa durée / Its length","Le compte-rendu écrit / The written record","Les retards / The delays","Les pauses / The breaks"],a:1,exp:{fr:"« Minutes » = compte-rendu.",en:"“Minutes” = the record."}},
           {type:'fill',q:{fr:"Complétez : « Let's ___ a meeting for Monday. » (organiser)",en:"Fill in: « Let's ___ up a meeting for Monday. » (set)"},accept:["set","set up","setup"],exp:{fr:"« to set up a meeting » = organiser une réunion.",en:"“to set up a meeting” = to organise one."}}]},
      {title:{fr:"Téléphone & présentations",en:"Phone calls & introductions"},
       lesson:{fr:"Au téléphone : <b>This is… speaking</b> (c'est… à l'appareil), <b>Could you put me through to…?</b> (me passer…), <b>I'll call you back</b> (je vous rappelle). Se présenter : <b>I'm in charge of…</b> (je suis responsable de…).",
               en:"On the phone: <b>This is… speaking</b>, <b>Could you put me through to…?</b>, <b>I'll call you back</b>. Introducing yourself: <b>I'm in charge of…</b>."},
       ex:[{type:'mcq',q:{fr:"« Could you put me through to Sarah? » demande de :",en:"« Could you put me through to Sarah? » asks to:"},o:["Raccrocher / Hang up","Transférer l'appel / Transfer the call","Rappeler / Call back","Laisser un message / Leave a message"],a:1,exp:{fr:"« put through » = transférer un appel.",en:"“put through” = transfer a call."}},
           {type:'fill',q:{fr:"Complétez : « Hello, this is Yousra ___ . » (à l'appareil)",en:"Fill in: « Hello, this is Yousra ___ . » (speaking)"},accept:["speaking"],exp:{fr:"« speaking » se place après le prénom au téléphone.",en:"“speaking” follows your name on the phone."}}]},
      {title:{fr:"Nombres, dates & planning",en:"Numbers, dates & scheduling"},
       lesson:{fr:"Dates en anglais : <b>on Monday</b>, <b>in March</b>, <b>at 3 p.m.</b>. Planifier : <b>to reschedule</b> (reprogrammer), <b>to postpone</b> (reporter), <b>deadline</b> (échéance), <b>available</b> (disponible).",
               en:"Dates: <b>on Monday</b>, <b>in March</b>, <b>at 3 p.m.</b>. Scheduling: <b>to reschedule</b>, <b>to postpone</b>, <b>deadline</b>, <b>available</b>."},
       ex:[{type:'fill',q:{fr:"Préposition : « The call is ___ Tuesday. » (le mardi)",en:"Preposition: « The call is ___ Tuesday. »"},accept:["on"],exp:{fr:"On utilise « on » avec les jours.",en:"Use “on” with days of the week."}},
           {type:'mcq',q:{fr:"« To postpone a meeting » signifie :",en:"« To postpone a meeting » means:"},o:["L'annuler / Cancel it","La reporter / Move it later","La raccourcir / Shorten it","La filmer / Record it"],a:1,exp:{fr:"« postpone » = reporter à plus tard.",en:"“postpone” = move to a later date."}}]},
      {title:{fr:"Analyse de texte — comprendre un e-mail",en:"Text analysis — understanding an email"},
       passage:{fr:"Dear Mr. Dubois,\n\nThank you for your email. Unfortunately, we are unable to confirm the delivery for next week, as our supplier is facing delays. We expect the goods to be available by 30 June and will keep you updated. We apologise for any inconvenience.\n\nBest regards,\nThe Logistics Team",
                en:"Dear Mr. Dubois,\n\nThank you for your email. Unfortunately, we are unable to confirm the delivery for next week, as our supplier is facing delays. We expect the goods to be available by 30 June and will keep you updated. We apologise for any inconvenience.\n\nBest regards,\nThe Logistics Team"},
       lesson:{fr:"Lisez l'e-mail ci-dessus, puis répondez aux questions. Repérez le <b>ton</b>, la <b>raison</b> du problème et la <b>date</b> clé.",
               en:"Read the email above, then answer the questions. Spot the <b>tone</b>, the <b>reason</b> for the issue, and the key <b>date</b>."},
       ex:[{type:'mcq',q:{fr:"Pourquoi la livraison ne peut-elle pas être confirmée ?",en:"Why can't the delivery be confirmed?"},o:["Le client n'a pas payé / The client hasn't paid","Le fournisseur a du retard / The supplier is delayed","La commande est annulée / The order is cancelled","L'adresse est fausse / Wrong address"],a:1,exp:{fr:"« our supplier is facing delays ».",en:"“our supplier is facing delays.”"}},
           {type:'fill',q:{fr:"À quelle date les marchandises seront-elles disponibles ? (jour mois)",en:"By what date will the goods be available? (day month)"},accept:["30 june","june 30","30 juin","30/06"],exp:{fr:"« available by 30 June ».",en:"“available by 30 June.”"}}]}
    ],
    intermediate:[
      {title:{fr:"Nuance & diplomatie",en:"Hedging & diplomacy"},
       lesson:{fr:"Adoucir un message : <b>I'm afraid…</b>, <b>It might be worth…</b>, <b>Could we possibly…</b>. Le conditionnel (would/could) rend la demande plus polie et professionnelle.",
               en:"Softening a message: <b>I'm afraid…</b>, <b>It might be worth…</b>, <b>Could we possibly…</b>. The conditional (would/could) makes requests more polite."},
       ex:[{type:'mcq',q:{fr:"Demande la plus diplomate :",en:"Most diplomatic request:"},o:["Send it now.","Could you possibly send it today?","Send it or else.","I need it. Now."],a:1,exp:{fr:"« Could you possibly… » = forme la plus polie.",en:"“Could you possibly…” is most polite."}},
           {type:'fill',q:{fr:"Complétez : « I'm ___ we can't meet your deadline. » (désolé/crains)",en:"Fill in: « I'm ___ we can't meet your deadline. » (afraid)"},accept:["afraid"],exp:{fr:"« I'm afraid… » annonce poliment une mauvaise nouvelle.",en:"“I'm afraid…” politely delivers bad news."}}]},
      {title:{fr:"Négociation & idiomes business",en:"Negotiation & business idioms"},
       lesson:{fr:"<b>Win-win</b> (gagnant-gagnant), <b>ballpark figure</b> (estimation), <b>to touch base</b> (reprendre contact), <b>the bottom line</b> (l'essentiel / le résultat net), <b>to meet halfway</b> (faire un compromis).",
               en:"<b>Win-win</b>, <b>ballpark figure</b> (rough estimate), <b>to touch base</b>, <b>the bottom line</b>, <b>to meet halfway</b> (compromise)."},
       ex:[{type:'mcq',q:{fr:"« A ballpark figure » est :",en:"“A ballpark figure” is:"},o:["Un chiffre exact / An exact number","Une estimation approximative / A rough estimate","Un stade / A stadium","Une perte / A loss"],a:1,exp:{fr:"Ordre de grandeur approximatif.",en:"An approximate order of magnitude."}},
           {type:'fill',q:{fr:"Complétez l'idiome : « Let's meet ___ . » (à mi-chemin = compromis)",en:"Complete the idiom: « Let's meet ___ . » (halfway)"},accept:["halfway","half way"],exp:{fr:"« meet halfway » = faire un compromis.",en:"“meet halfway” = compromise."}}]},
      {title:{fr:"Phrasal verbs au bureau",en:"Phrasal verbs at work"},
       lesson:{fr:"Très courants : <b>carry out</b> (réaliser), <b>set up</b> (mettre en place), <b>follow up</b> (relancer), <b>call off</b> (annuler), <b>look into</b> (examiner), <b>roll out</b> (déployer).",
               en:"Very common: <b>carry out</b>, <b>set up</b>, <b>follow up</b>, <b>call off</b> (cancel), <b>look into</b> (investigate), <b>roll out</b> (deploy)."},
       ex:[{type:'fill',q:{fr:"Complétez : « We had to ___ ___ the event due to weather. » (annuler)",en:"Fill in: « We had to ___ ___ the event due to weather. » (cancel)"},accept:["call off","call it off"],exp:{fr:"« call off » = annuler.",en:"“call off” = cancel."}},
           {type:'mcq',q:{fr:"« To look into a problem » signifie :",en:"« To look into a problem » means:"},o:["L'ignorer / Ignore it","L'examiner / Investigate it","Le créer / Create it","Le vendre / Sell it"],a:1,exp:{fr:"« look into » = examiner, enquêter.",en:"“look into” = investigate."}}]},
      {title:{fr:"Rédiger un résumé clair",en:"Writing a clear summary"},
       lesson:{fr:"Un bon résumé : <b>une idée principale</b>, des <b>connecteurs</b> (however, therefore, in addition) et une <b>conclusion</b>. On reformule, on ne copie pas. On reste factuel et concis.",
               en:"A good summary: <b>one main idea</b>, <b>connectors</b> (however, therefore, in addition), and a <b>conclusion</b>. Rephrase, don't copy. Stay factual and concise."},
       ex:[{type:'mcq',q:{fr:"Quel connecteur exprime une opposition ?",en:"Which connector expresses contrast?"},o:["Therefore","However","In addition","Because"],a:1,exp:{fr:"« However » = cependant (opposition).",en:"“However” signals contrast."}},
           {type:'fill',q:{fr:"Complétez : « Sales rose; ___ , costs also increased. » (cependant)",en:"Fill in: « Sales rose; ___ , costs also increased. » (however)"},accept:["however"],exp:{fr:"« however » introduit une nuance contraire.",en:"“however” introduces a contrasting point."}}]},
      {title:{fr:"Analyse d'article — actualité business",en:"Article analysis — business news"},
       passage:{fr:"A leading European bank announced on Monday that its quarterly profits rose by 12%, driven by strong demand for loans. However, the bank warned that rising interest rates could slow growth in the coming months. Analysts remain cautiously optimistic.",
                en:"A leading European bank announced on Monday that its quarterly profits rose by 12%, driven by strong demand for loans. However, the bank warned that rising interest rates could slow growth in the coming months. Analysts remain cautiously optimistic."},
       lesson:{fr:"Lisez l'article, puis identifiez le <b>chiffre clé</b>, la <b>cause</b> et le <b>risque</b> évoqué.",
               en:"Read the article, then identify the <b>key figure</b>, the <b>cause</b> and the <b>risk</b> mentioned."},
       ex:[{type:'fill',q:{fr:"De combien les profits ont-ils augmenté ? (en %)",en:"By how much did profits rise? (in %)"},accept:["12","12%","12 percent","12 per cent"],exp:{fr:"« profits rose by 12% ».",en:"“profits rose by 12%.”"}},
           {type:'mcq',q:{fr:"Quel risque la banque évoque-t-elle ?",en:"What risk does the bank mention?"},o:["La baisse des prêts / Fewer loans","La hausse des taux d'intérêt / Rising interest rates","Un scandale / A scandal","Une cyberattaque / A cyberattack"],a:1,exp:{fr:"« rising interest rates could slow growth ».",en:"“rising interest rates could slow growth.”"}}]}
    ]
  },
  compliance:{
    beginner:[
      {title:{fr:"Les piliers de la conformité",en:"Pillars of compliance"},
       lesson:{fr:"La conformité repose sur : <b>KYC</b> (connaître son client), <b>AML</b> (anti-blanchiment), la <b>gestion des conflits d'intérêts</b> et la <b>protection des données</b>. But : prévenir les risques légaux et de réputation.",
               en:"Compliance rests on: <b>KYC</b>, <b>AML</b>, <b>conflict-of-interest management</b> and <b>data protection</b>. Goal: prevent legal and reputational risk."},
       ex:[{type:'mcq',q:{fr:"Le KYC vise surtout à :",en:"KYC mainly aims to:"},o:["Vérifier l'identité du client / Verify client identity","Vendre plus / Sell more","Réduire les coûts / Cut costs","Recruter / Recruit"],a:0,exp:{fr:"Identifier et vérifier le client = cœur du KYC.",en:"Identifying and verifying the client is the core."}},
           {type:'fill',q:{fr:"« KYC » signifie Know Your ___ . (client)",en:"« KYC » stands for Know Your ___ ."},accept:["customer","client"],exp:{fr:"Know Your Customer.",en:"Know Your Customer."}}]},
      {title:{fr:"KYC & identification du client",en:"KYC & client identification"},
       lesson:{fr:"Le KYC vérifie l'<b>identité</b>, l'<b>origine des fonds</b> et le <b>profil de risque</b>. Les clients à risque élevé (PPE — personnes politiquement exposées) exigent une <b>vigilance renforcée</b>.",
               en:"KYC checks <b>identity</b>, <b>source of funds</b> and <b>risk profile</b>. High-risk clients (PEPs — politically exposed persons) require <b>enhanced due diligence</b>."},
       ex:[{type:'mcq',q:{fr:"Une « PPE » nécessite :",en:"A “PEP” requires:"},o:["Aucune vérification / No checks","Une vigilance renforcée / Enhanced due diligence","Un cadeau / A gift","Un compte gratuit / A free account"],a:1,exp:{fr:"Les PPE imposent une vigilance renforcée.",en:"PEPs require enhanced due diligence."}},
           {type:'fill',q:{fr:"On doit vérifier l'origine des ___ du client. (fonds)",en:"You must verify the client's source of ___ . (funds)"},accept:["funds","fonds","money"],exp:{fr:"Origine des fonds = élément clé du KYC.",en:"Source of funds is a key KYC element."}}]},
      {title:{fr:"AML — les bases de l'anti-blanchiment",en:"AML — anti-money-laundering basics"},
       lesson:{fr:"Le blanchiment suit 3 étapes : <b>placement</b> (introduire l'argent), <b>empilage</b> (brouiller la traçabilité), <b>intégration</b> (réinjecter comme légitime). Signaux d'alerte : espèces fractionnées, opérations sans logique économique.",
               en:"Laundering follows 3 stages: <b>placement</b>, <b>layering</b> (obscuring the trail), <b>integration</b> (reintroducing as legitimate). Red flags: structured cash, transactions with no economic rationale."},
       ex:[{type:'mcq',q:{fr:"Un signe d'alerte de blanchiment :",en:"A money-laundering red flag:"},o:["Virement régulier / Regular transfer","Dépôts en espèces fractionnés inexpliqués / Unexplained structured cash","Facture détaillée / Itemised invoice","RIB fourni / IBAN provided"],a:1,exp:{fr:"Le fractionnement (« structuring ») est classique.",en:"Structuring is a classic red flag."}},
           {type:'fill',q:{fr:"La 2e étape du blanchiment s'appelle l'___ . (empilage / layering)",en:"The 2nd stage of laundering is called ___ . (layering)"},accept:["layering","empilage"],exp:{fr:"Placement → layering → intégration.",en:"Placement → layering → integration."}}]},
      {title:{fr:"Conflits d'intérêts",en:"Conflicts of interest"},
       lesson:{fr:"Un conflit existe quand un intérêt personnel peut influencer une décision pro. Règle d'or : <b>divulguer</b>, puis gérer (abstention, muraille de Chine). Ne jamais dissimuler.",
               en:"A conflict exists when a personal interest could sway a professional decision. Golden rule: <b>disclose</b>, then manage (recusal, information barrier). Never conceal."},
       ex:[{type:'mcq',q:{fr:"Première bonne réaction face à un conflit :",en:"First correct reaction to a conflict:"},o:["Le déclarer / Disclose it","Le cacher / Hide it","En profiter / Exploit it","Démissionner / Resign"],a:0,exp:{fr:"La divulgation est la première étape.",en:"Disclosure is the first step."}},
           {type:'fill',q:{fr:"Face à un conflit, il faut d'abord le ___ . (divulguer)",en:"Facing a conflict, you must first ___ it. (disclose)"},accept:["disclose","divulguer","declarer","déclarer"],exp:{fr:"Divulguer avant de gérer.",en:"Disclose before managing."}}]},
      {title:{fr:"Analyse de cas — repérer un signal d'alerte",en:"Case analysis — spotting a red flag"},
       passage:{fr:"Un nouveau client souhaite ouvrir un compte et déposer 9 500 € en espèces aujourd'hui, puis indique qu'il déposera des montants similaires « par petites tranches » les jours suivants pour « éviter la paperasse ». Il refuse de préciser l'origine des fonds.",
                en:"A new client wants to open an account and deposit €9,500 in cash today, then says he will deposit similar amounts “in small chunks” over the next days to “avoid paperwork.” He refuses to disclose the source of funds."},
       lesson:{fr:"Lisez le cas, puis identifiez le problème de conformité.",
               en:"Read the case, then identify the compliance issue."},
       ex:[{type:'mcq',q:{fr:"Quel est le principal signal d'alerte ?",en:"What is the main red flag?"},o:["Le montant est trop faible / Amount too low","Le fractionnement pour éviter les seuils / Structuring to avoid thresholds","Il vient en personne / He comes in person","Il a un nom étranger / He has a foreign name"],a:1,exp:{fr:"Déposer par tranches pour éviter les seuils = structuring.",en:"Splitting deposits to dodge thresholds = structuring."}},
           {type:'fill',q:{fr:"Le client refuse de préciser l'___ des fonds. (origine)",en:"The client refuses to disclose the ___ of funds. (source)"},accept:["origine","source"],exp:{fr:"Refus d'expliquer l'origine = vigilance renforcée.",en:"Refusing to explain the source triggers enhanced scrutiny."}}]}
    ],
    intermediate:[
      {title:{fr:"CFA — Code of Ethics & Standards",en:"CFA — Code of Ethics & Standards"},
       lesson:{fr:"Le CFA Institute impose 6 principes, dont la <b>primauté de l'intégrité des marchés</b> et l'intérêt du client <b>avant</b> l'intérêt personnel ou de l'employeur. Les Standards couvrent professionnalisme, marchés, devoirs envers les clients et conflits.",
               en:"CFA Institute sets 6 principles, including the <b>primacy of market integrity</b> and the client's interest <b>before</b> personal or employer interest. The Standards cover professionalism, markets, duties to clients and conflicts."},
       ex:[{type:'mcq',q:{fr:"Selon le Code CFA, l'ordre de priorité est :",en:"Per the CFA Code, the priority order is:"},o:["Soi > Employeur > Client","Client & intégrité du marché d'abord / Client & market integrity first","Employeur d'abord / Employer first","Aucun ordre / No order"],a:1,exp:{fr:"L'intégrité du marché et le client priment.",en:"Market integrity and the client come first."}},
           {type:'fill',q:{fr:"L'intérêt du client passe ___ l'intérêt personnel. (avant)",en:"The client's interest comes ___ personal interest. (before)"},accept:["avant","before"],exp:{fr:"Le client avant soi-même.",en:"Client before self."}}]},
      {title:{fr:"Information privilégiée & abus de marché",en:"Insider information & market abuse"},
       lesson:{fr:"L'<b>information privilégiée</b> (material non-public) ne doit ni servir à trader, ni être transmise (« tipping »). La <b>manipulation de marché</b> (fausses rumeurs, cours artificiels) est interdite. Sanctions civiles et pénales.",
               en:"<b>Material non-public information</b> must not be traded on or passed along (“tipping”). <b>Market manipulation</b> (false rumours, artificial prices) is prohibited. Civil and criminal penalties apply."},
       ex:[{type:'mcq',q:{fr:"Trader sur une information privilégiée est :",en:"Trading on inside information is:"},o:["Autorisé si discret / Allowed if discreet","Interdit / Prohibited","Recommandé / Recommended","Neutre / Neutral"],a:1,exp:{fr:"Violation grave (Standard II-A).",en:"A serious violation (Standard II-A)."}},
           {type:'fill',q:{fr:"Transmettre une info privilégiée à un tiers s'appelle le « ___ ». (tipping)",en:"Passing inside info to a third party is called “___ ”. (tipping)"},accept:["tipping"],exp:{fr:"« Tipping » est aussi sanctionné.",en:"“Tipping” is also sanctioned."}}]},
      {title:{fr:"Signalement & escalade",en:"Reporting & escalation"},
       lesson:{fr:"Tout collaborateur doit savoir <b>signaler</b> un manquement via les canaux internes (compliance officer, whistleblowing). On documente les faits et on préserve les preuves. La non-déclaration peut être sanctionnée.",
               en:"Every employee must know how to <b>report</b> a breach via internal channels (compliance officer, whistleblowing). Document facts and preserve evidence. Failure to report can be sanctioned."},
       ex:[{type:'mcq',q:{fr:"Face à un manquement avéré, il faut :",en:"Facing a confirmed breach, you should:"},o:["Le signaler en interne / Report it internally","Le garder pour soi / Keep it quiet","Le publier en ligne / Post it online","Attendre 1 an / Wait a year"],a:0,exp:{fr:"Le signalement interne documenté est la bonne voie.",en:"Documented internal reporting is correct."}},
           {type:'fill',q:{fr:"Le dispositif d'alerte interne s'appelle le « ___ ». (whistleblowing)",en:"The internal alert system is called “___ ”. (whistleblowing)"},accept:["whistleblowing"],exp:{fr:"Le whistleblowing protège le lanceur d'alerte.",en:"Whistleblowing protects the reporter."}}]},
      {title:{fr:"Protection des données (RGPD)",en:"Data protection (GDPR)"},
       lesson:{fr:"Le <b>RGPD</b> impose : <b>minimisation</b> (collecter le strict nécessaire), <b>finalité</b> (usage défini), <b>consentement</b>, <b>sécurité</b> et droit à l'<b>effacement</b>. Une fuite doit être notifiée rapidement.",
               en:"<b>GDPR</b> requires: <b>data minimisation</b>, <b>purpose limitation</b>, <b>consent</b>, <b>security</b> and the right to <b>erasure</b>. A breach must be notified promptly."},
       ex:[{type:'mcq',q:{fr:"Le principe de « minimisation » signifie :",en:"The “minimisation” principle means:"},o:["Tout collecter / Collect everything","Collecter le strict nécessaire / Collect only what's needed","Vendre les données / Sell the data","Garder à vie / Keep forever"],a:1,exp:{fr:"On ne collecte que le nécessaire.",en:"Collect only what is necessary."}},
           {type:'fill',q:{fr:"Le client a un droit à l'___ de ses données. (effacement)",en:"The client has a right to ___ of their data. (erasure)"},accept:["effacement","erasure","oubli"],exp:{fr:"Droit à l'effacement / à l'oubli.",en:"Right to erasure / to be forgotten."}}]},
      {title:{fr:"Analyse de scénario — dilemme éthique",en:"Scenario analysis — ethics dilemma"},
       passage:{fr:"Un gérant apprend, lors d'un dîner privé, qu'une société va annoncer demain le rachat d'un concurrent. Avant l'annonce publique, il envisage d'acheter des actions de la cible pour ses clients afin d'améliorer leur performance.",
                en:"At a private dinner, a portfolio manager learns that a company will announce the takeover of a competitor tomorrow. Before the public announcement, he considers buying the target's shares for his clients to boost their performance."},
       lesson:{fr:"Lisez le scénario, puis identifiez la règle enfreinte et la bonne conduite.",
               en:"Read the scenario, then identify the rule breached and the correct conduct."},
       ex:[{type:'mcq',q:{fr:"Acheter avant l'annonce serait :",en:"Buying before the announcement would be:"},o:["Un bon service au client / Good client service","Un délit d'initié / Insider dealing","Une diversification / Diversification","Sans risque / Risk-free"],a:1,exp:{fr:"Agir sur une info non publique = délit d'initié.",en:"Acting on non-public info = insider dealing."}},
           {type:'fill',q:{fr:"L'information n'est pas encore ___ . (publique)",en:"The information is not yet ___ . (public)"},accept:["publique","public"],exp:{fr:"Tant qu'elle n'est pas publique, interdiction d'agir.",en:"While non-public, acting is prohibited."}}]}
    ]
  },
  finance:{
    beginner:[
      {title:{fr:"Assurance — Notions clés",en:"Insurance — Key concepts"},
       lesson:{fr:"<span class='ptag'></span><b>ASSURANCE.</b> Vocabulaire : <b>prime</b> (ce que paie l'assuré), <b>franchise</b> (reste à charge), <b>sinistre</b> (événement couvert), <b>garantie</b> (ce qui est couvert), <b>indemnité</b> (somme versée après sinistre).",
               en:"<b>INSURANCE.</b> Vocabulary: <b>premium</b> (what the insured pays), <b>deductible</b> (out-of-pocket share), <b>claim</b> (covered event), <b>coverage</b>, <b>indemnity</b> (amount paid after a claim)."},
       ex:[{type:'mcq',q:{fr:"La franchise est :",en:"The deductible is:"},o:["Ce que paie l'assureur / What the insurer pays","Ce qui reste à la charge de l'assuré / Paid by the insured","Une taxe / A tax","Un bonus / A bonus"],a:1,exp:{fr:"La franchise reste à la charge de l'assuré.",en:"The deductible stays with the insured."}},
           {type:'fill',q:{fr:"La somme payée par l'assuré chaque année est la ___ . (prime)",en:"The amount the insured pays each year is the ___ . (premium)"},accept:["prime","premium"],exp:{fr:"La prime finance la couverture.",en:"The premium funds the cover."}}]},
      {title:{fr:"Assurance — Garanties & exclusions",en:"Insurance — Coverage & exclusions"},
       lesson:{fr:"<b>ASSURANCE.</b> Le contrat liste les <b>garanties</b> (risques couverts) et les <b>exclusions</b> (non couverts). La <b>déclaration</b> exacte du risque est obligatoire : une fausse déclaration peut annuler l'indemnisation.",
               en:"<b>INSURANCE.</b> The policy lists <b>coverage</b> (covered risks) and <b>exclusions</b> (not covered). Accurate <b>risk disclosure</b> is mandatory: a false statement can void the payout."},
       ex:[{type:'mcq',q:{fr:"« Exclusion » désigne :",en:"“Exclusion” refers to:"},o:["Un risque non couvert / A non-covered risk","Une réduction / A discount","Un remboursement / A refund","Un client VIP / A VIP client"],a:0,exp:{fr:"Les exclusions listent ce qui n'est pas garanti.",en:"Exclusions list what is not covered."}},

/* ============ Storage / auth (prototype) ============ */
const DB = {
  users(){ return JSON.parse(localStorage.getItem('su_users')||'{}'); },
  saveUsers(u){ localStorage.setItem('su_users',JSON.stringify(u)); },
  session(){ return localStorage.getItem('su_session'); },
  setSession(e){ e?localStorage.setItem('su_session',e):localStorage.removeItem('su_session'); }
};
function hash(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h+s.charCodeAt(i))>>>0;return ''+h;}
function currentUser(){ const e=DB.session(); if(!e) return null; return DB.users()[e]||null; }
function saveUser(u){ const all=DB.users(); all[u.email]=u; DB.saveUsers(all); }
function normalize(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9% ]/g,'').replace(/\s+/g,' ').trim(); }

/* ============ App state ============ */
let st = { domain:null };
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}
function show(id){['view-gate','view-exreset','view-auth','view-dash','view-test','view-modules'].forEach(v=>document.getElementById(v).classList.toggle('hidden',v!==id));}
function gatePassed(){ return localStorage.getItem('su_gate_ok')==='1'; }

/* ============ Render dispatcher ============ */
function render(){
  document.getElementById('foot').textContent = t('securityNote');
  if(isSpecialReset() && !window._exResetDone){ renderExReset(); show('view-exreset');
    document.getElementById('logoutBtn').classList.add('hidden'); document.getElementById('who').textContent=''; return; }
  const u=currentUser();
  const lo=document.getElementById('logoutBtn');
  lo.textContent=t('logout');
  lo.classList.toggle('hidden',!u);
  document.getElementById('who').textContent = u ? (t('welcome')+', '+u.name) : '';
  if(!u){
    if(!gatePassed()){ renderGate(); show('view-gate'); return; }
    renderAuth(); show('view-auth'); return;
  }
  if(st.view==='test'){ renderTest(); show('view-test'); }
  else if(st.view==='modules'){ renderModules(); show('view-modules'); }
  else { renderDash(); show('view-dash'); }
}

/* ============ Gate view ============ */
function renderGate(){
  const v=document.getElementById('view-gate');
  v.innerHTML=`
   <div class="card" style="max-width:420px;margin:40px auto;text-align:center">
     <div class="logo" style="width:56px;height:56px;border-radius:16px;margin:0 auto 14px;font-size:26px">🔒</div>
     <h1>${t('gateTitle')}</h1>
     <p class="sub">${t('gateSub')}</p>
     <input id="g-code" placeholder="••••••" style="text-align:center;letter-spacing:2px;font-weight:700"
       onkeydown="if(event.key==='Enter')submitGate()">
     <div class="msg err" id="gate-msg"></div>
     <button class="btn full" onclick="submitGate()">${t('gateBtn')}</button>
   </div>`;
  setTimeout(()=>{const el=document.getElementById('g-code');el&&el.focus&&el.focus();},0);
}
function submitGate(){
  const val=(document.getElementById('g-code').value||'').trim();
  if(val.toUpperCase()===ACCESS_CODE.toUpperCase()){ localStorage.setItem('su_gate_ok','1'); render(); }
  else { document.getElementById('gate-msg').textContent=t('gateErr'); }
}

/* ============ Auth view ============ */
let authMode='login';
function renderAuth(){
  const v=document.getElementById('view-auth');
  if(authMode==='forgot'){ renderForgot(v); return; }
  const selStyle="width:100%;padding:12px 14px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;color:var(--text);font-size:15px;font-family:inherit";
  const secOpts=SECQ.map((qq,i)=>`<option value="${i}">${qq[lang]}</option>`).join('');
  v.innerHTML=`
   <div class="card" style="max-width:440px;margin:30px auto">
     <h1>${authMode==='login'?t('login'):t('signup')}</h1>
     <p class="sub">${t('tagline')}</p>
     ${authMode==='signup'?`<label>${t('name')}</label><input id="f-name" autocomplete="given-name">`:''}
     <label>${t('email')}</label><input id="f-email" type="email" autocomplete="email">
     <label>${t('pwd')}</label><input id="f-pwd" type="password" autocomplete="current-password">
     ${authMode==='signup'?`<label>${t('secQuestion')}</label><select id="f-secq" style="${selStyle}">${secOpts}</select><label>${t('secAnswer')}</label><input id="f-seca">`:''}
     <div class="msg err" id="auth-msg"></div>
     <button class="btn full" onclick="submitAuth()">${authMode==='login'?t('login'):t('signup')}</button>
     ${authMode==='login'?`<p class="sub" style="margin-top:12px;text-align:center"><span class="link" onclick="startForgot()">${t('forgotPwd')}</span></p>`:''}
     <p class="sub" style="margin-top:8px;text-align:center">
       ${authMode==='login'?t('noAccount'):t('haveAccount')}
       <span class="link" onclick="toggleAuth()">${authMode==='login'?t('signupNow'):t('loginNow')}</span>
     </p>
   </div>`;
}
let forgotStep=1, forgotUser=null;
function startForgot(){ authMode='forgot'; forgotStep=1; forgotUser=null; renderAuth(); }
function backToLogin(){ authMode='login'; renderAuth(); }
function renderForgot(v){
  if(forgotStep===1){
    v.innerHTML=`
     <div class="card" style="max-width:440px;margin:30px auto">
       <h1>${t('resetTitle')}</h1>
       <p class="sub">${t('resetSub')}</p>
       <label>${t('email')}</label><input id="r-email" type="email">
       <div class="msg err" id="auth-msg"></div>
       <button class="btn full" onclick="forgotLookup()">${t('continueBtn')}</button>
       <p class="sub" style="margin-top:14px;text-align:center"><span class="link" onclick="backToLogin()">← ${t('login')}</span></p>
     </div>`;
  } else {
    v.innerHTML=`
     <div class="card" style="max-width:440px;margin:30px auto">
       <h1>${t('resetTitle')}</h1>
       <label>${t('secQuestion')}</label>
       <div class="lesson" style="margin:6px 0 0">${SECQ[forgotUser.secQ][lang]}</div>
       <label>${t('secAnswer')}</label><input id="r-ans">
       <label>${t('newPwd')}</label><input id="r-pwd" type="password">
       <div class="msg err" id="auth-msg"></div>
       <button class="btn full" onclick="doReset()">${t('resetBtn')}</button>
       <p class="sub" style="margin-top:14px;text-align:center"><span class="link" onclick="backToLogin()">← ${t('login')}</span></p>
     </div>`;
  }
}
function forgotLookup(){
  const email=(document.getElementById('r-email').value||'').trim().toLowerCase();
  const msg=document.getElementById('auth-msg');
  const u=DB.users()[email];
  if(!u){ msg.textContent=t('emailNotFound'); return; }
  if(u.secQ===undefined||u.secQ===null||u.secA===undefined){ msg.textContent=t('noSecQ'); return; }
  forgotUser=u; forgotStep=2; renderAuth();
}
function doReset(){
  const ans=document.getElementById('r-ans').value||'';
  const np=document.getElementById('r-pwd').value||'';
  const msg=document.getElementById('auth-msg');
  if(hash(normalize(ans))!==forgotUser.secA){ msg.textContent=t('wrongAnswer'); return; }
  if(np.length<6){ msg.textContent=t('pwdShort'); return; }
  forgotUser.pwd=hash(np); saveUser(forgotUser);
  toast(t('pwdResetOk')); authMode='login'; renderAuth();
}
/* ---- Lien exceptionnel de réinitialisation ---- */
function renderExReset(){
  const v=document.getElementById('view-exreset');
  v.innerHTML=`
   <div class="card" style="max-width:440px;margin:40px auto">
     <div class="logo" style="width:54px;height:54px;border-radius:16px;margin:0 auto 14px;font-size:24px">🔑</div>
     <h1 style="text-align:center">${t('exResetTitle')}</h1>
     <p class="sub" style="text-align:center">${t('exResetSub')}</p>
     <label>${t('email')}</label><input id="xr-email" type="email">
     <label>${t('newPwd')}</label><input id="xr-pwd" type="password">
     <div class="msg err" id="xr-msg"></div>
     <button class="btn full" onclick="doExReset()">${t('exResetBtn')}</button>
   </div>`;
}
function doExReset(){
  const email=(document.getElementById('xr-email').value||'').trim().toLowerCase();
  const np=document.getElementById('xr-pwd').value||'';
  const msg=document.getElementById('xr-msg');
  const u=DB.users()[email];
  if(!u){ msg.textContent=t('exResetNotFound'); return; }
  if(np.length<6){ msg.textContent=t('pwdShort'); return; }
  u.pwd=hash(np); saveUser(u);
  document.getElementById('view-exreset').innerHTML=`
   <div class="card" style="max-width:440px;margin:40px auto;text-align:center">
     <div class="logo" style="width:54px;height:54px;border-radius:16px;margin:0 auto 14px;font-size:24px">✅</div>
     <h1>${t('exResetOk')}</h1>
     <button class="btn full" onclick="finishExReset()">${t('goLogin')}</button>
   </div>`;
}
function finishExReset(){ window._exResetDone=true; render(); }
function toggleAuth(){ authMode=authMode==='login'?'signup':'login'; renderAuth(); }
function submitAuth(){
  const email=(document.getElementById('f-email').value||'').trim().toLowerCase();
  const pwd=document.getElementById('f-pwd').value||'';
  const msg=document.getElementById('auth-msg');
  if(!email||!pwd||(authMode==='signup'&&!document.getElementById('f-name').value.trim())){msg.textContent=t('fillAll');return;}
  if(authMode==='signup'){
    if(pwd.length<6){msg.textContent=t('pwdShort');return;}
    const all=DB.users(); if(all[email]){msg.textContent=t('emailUsed');return;}
    const name=document.getElementById('f-name').value.trim();
    const secQ=parseInt(document.getElementById('f-secq').value,10);
    const secAraw=document.getElementById('f-seca').value.trim();
    if(!secAraw){msg.textContent=t('fillAll');return;}
    saveUser({email,name,pwd:hash(pwd),secQ:secQ,secA:hash(normalize(secAraw)),progress:{}});
    DB.setSession(email);
  } else {
    const u=DB.users()[email];
    if(!u||u.pwd!==hash(pwd)){msg.textContent=t('badLogin');return;}
    DB.setSession(email);
  }
  st={domain:null,view:'dash'}; render();
}
function logout(){ DB.setSession(null); st={domain:null}; render(); }

/* ============ Dashboard ============ */
function renderDash(){
  const u=currentUser();
  const v=document.getElementById('view-dash');
  let cards='';
  for(const key in DOMAINS){
    const d=DOMAINS[key]; const p=u.progress[key];
    let badge=`<span class="badge none">${t('notTested')}</span>`, barHtml='';
    if(p&&p.level){
      const lvl = p.level==='beginner'?t('levelBeginner'):t('levelInter');
      const cls = p.level==='beginner'?'deb':'int';
      badge=`<span class="badge ${cls}">${t('level')}: ${lvl}</span>`;
      const pct=moduleProgress(key,p.level);
      barHtml=`<div class="bar"><i style="width:${pct}%"></i></div><small class="muted">${t('progress')}: ${pct}%</small>`;
    }
    cards+=`<div class="domain" onclick="enterDomain('${key}')">
       <div class="ic">${d.ic}</div>
       <h3>${d.name[lang]}</h3><small>${d.desc[lang]}</small><br>${badge}${barHtml}
     </div>`;
  }
  v.innerHTML=`<div class="card">
     <h1>${t('welcome')}, ${u.name} 👋</h1>
     <p class="sub">${t('chooseDomain')}</p>
     <div class="grid">${cards}</div>
   </div>`;
}
function enterDomain(key){
  st.domain=key; const u=currentUser(); const p=u.progress[key];
  if(p&&p.level){ st.view='modules'; } else { st.view='test'; st.answers={}; st.submitted=false; }
  render();
}

/* ============ Test view ============ */
function renderTest(){
  const key=st.domain, d=DOMAINS[key], qs=TESTS[key];
  st.answers=st.answers||{};
  const v=document.getElementById('view-test');
  let body='';
  qs.forEach((item,i)=>{
    let opts='';
    item.o.forEach((o,j)=>{
      let cls='opt';
      if(st.submitted){ if(j===item.a)cls+=' correct'; else if(st.answers[i]===j)cls+=' wrong'; }
      else if(st.answers[i]===j)cls+=' sel';
      opts+=`<button class="${cls}" ${st.submitted?'disabled':''} onclick="pick(${i},${j})">${o}</button>`;
    });
    body+=`<div class="q"><b>${t('q')} ${i+1}.</b> ${item.q[lang]}${opts}</div>`;
  });
  let footer;
  if(st.submitted){
    const sc=scoreTest(); const lvl=sc.pct>=60?'intermediate':'beginner';
    footer=`<div class="result-big">
       <div class="score">${sc.correct}/${sc.total}</div>
       <p class="sub">${t('yourScore')} — ${sc.pct}%</p>
       <span class="badge ${lvl==='beginner'?'deb':'int'}" style="font-size:14px">${t('level')}: ${lvl==='beginner'?t('levelBeginner'):t('levelInter')}</span>
       <p class="sub" style="margin-top:14px">${lvl==='beginner'?t('resultBeginnerMsg'):t('resultInterMsg')}</p>
       <button class="btn" onclick="finishTest()">${t('seeModules')}</button>
     </div>`;
  } else {
    footer=`<button class="btn full" onclick="submitTest()">${t('validate')}</button>`;
  }
  v.innerHTML=`<div class="card">
     <div class="row"><span class="pill">${d.ic} ${d.name[lang]}</span><div class="spacer"></div>
       <span class="link" onclick="goDash()">← ${t('back')}</span></div>
     <h1 style="margin-top:14px">${t('testTitle')}</h1>
     <p class="sub">${d.desc[lang]}</p>${body}${footer}</div>`;
}
function pick(i,j){ if(st.submitted)return; st.answers[i]=j; renderTest(); }
function scoreTest(){ const qs=TESTS[st.domain]; let c=0; qs.forEach((it,i)=>{if(st.answers[i]===it.a)c++;});
  return {correct:c,total:qs.length,pct:Math.round(c/qs.length*100)}; }
function submitTest(){
  const qs=TESTS[st.domain];
  if(Object.keys(st.answers).length<qs.length){ toast(t('answerAll')); return; }
  st.submitted=true; renderTest();
}
function finishTest(){
  const sc=scoreTest(); const lvl=sc.pct>=60?'intermediate':'beginner';
  const u=currentUser(); u.progress[st.domain]={level:lvl,score:sc.pct,modules:{}}; saveUser(u);
  st.view='modules'; render();
}
function goDash(){ st.view='dash'; st.domain=null; render(); }

/* ============ Modules view ============ */
function moduleProgress(key,level){
  const u=currentUser(); const p=u.progress[key]; if(!p)return 0;
  const mods=MODULES[key][level]; const done=p.modules?Object.values(p.modules).filter(Boolean).length:0;
  return Math.round(done/mods.length*100);
}
function renderModules(){
  const key=st.domain, d=DOMAINS[key], u=currentUser(), p=u.progress[key];
  const level=p.level, mods=MODULES[key][level];
  const v=document.getElementById('view-modules');
  let list='';
  mods.forEach((m,mi)=>{
    const done=p.modules&&p.modules[mi];
    const passageHtml = m.passage ? `<div class="passage"><span class="ptag">📄 ${t('textToAnalyze')}</span>${(m.passage[lang]).replace(/\n/g,'<br>')}</div>` : '';
    let ex='';
    m.ex.forEach((e,ei)=>{
      if(e.type==='fill'){
        ex+=`<div class="q" style="margin-top:14px"><b>${e.q[lang]}</b>
              <div class="fillrow">
                <input id="fi-${mi}-${ei}" placeholder="${t('yourAnswer')}" onkeydown="if(event.key==='Enter')answerFill(${mi},${ei})">
                <button class="btn sm" onclick="answerFill(${mi},${ei})">${t('checkAns')}</button>
              </div>
              <div class="expl hidden" id="exp-${mi}-${ei}"></div></div>`;
      } else {
        let opts='';
        e.o.forEach((o,j)=>{ opts+=`<button class="opt" onclick="answerEx(${mi},${ei},${j})" id="ex-${mi}-${ei}-${j}">${o}</button>`; });
        ex+=`<div class="q" style="margin-top:14px"><b>${e.q[lang]}</b>${opts}<div class="expl hidden" id="exp-${mi}-${ei}"></div></div>`;
      }
    });
    list+=`<div class="module">
       <div class="mhead" onclick="toggleModule(${mi})">
         <div class="check ${done?'done':''}" id="chk-${mi}">${done?'✓':''}</div>
         <h3 style="margin:0">${m.title[lang]}</h3>
       </div>
       <div id="mbody-${mi}" class="${st.openModule===mi?'':'hidden'}">
         <div class="lesson"><b>${t('lesson')}</b><br>${m.lesson[lang]}</div>
         ${passageHtml}
         <h3>${t('practice')}</h3>${ex}
         <button class="btn ghost" style="margin-top:14px" onclick="markDone(${mi})">${done?('✓ '+t('done')):t('markDone')}</button>
       </div>
     </div>`;
  });
  const lvlLabel = level==='beginner'?t('levelBeginner'):t('levelInter');
  v.innerHTML=`<div class="card">
     <div class="row"><span class="pill">${d.ic} ${d.name[lang]}</span>
       <span class="badge ${level==='beginner'?'deb':'int'}">${t('level')}: ${lvlLabel}</span>
       <div class="spacer"></div><span class="link" onclick="goDash()">← ${t('back')}</span></div>
     <h1 style="margin-top:14px">${t('modulesOf')} — ${d.name[lang]}</h1>
     <div class="bar" style="max-width:320px"><i style="width:${moduleProgress(key,level)}%"></i></div>
     <p class="sub">${t('progress')}: ${moduleProgress(key,level)}%</p>
     ${list}
     <div class="row" style="margin-top:6px">
       <button class="btn ghost" onclick="retest()">↻ ${t('retest')}</button>
     </div>
   </div>`;
}
function toggleModule(mi){ st.openModule = st.openModule===mi?null:mi; renderModules(); }
function curLevel(){ return currentUser().progress[st.domain].level; }
function answerEx(mi,ei,j){
  const e=MODULES[st.domain][curLevel()][mi].ex[ei];
  for(let k=0;k<e.o.length;k++){
    const el=document.getElementById(`ex-${mi}-${ei}-${k}`); if(!el)continue;
    el.classList.remove('correct','wrong');
    if(k===e.a)el.classList.add('correct'); else if(k===j)el.classList.add('wrong');
    el.setAttribute('disabled','');
  }
  const exp=document.getElementById(`exp-${mi}-${ei}`);
  exp.classList.remove('hidden');
  exp.innerHTML=(j===e.a?('✅ '+t('correct')):('❌ '+t('incorrect')))+' '+(e.exp?e.exp[lang]:'');
}
function answerFill(mi,ei){
  const e=MODULES[st.domain][curLevel()][mi].ex[ei];
  const input=document.getElementById(`fi-${mi}-${ei}`);
  const val=normalize(input.value);
  const ok=e.accept.some(a=>normalize(a)===val) && val!=='';
  input.classList.remove('good','bad'); input.classList.add(ok?'good':'bad'); input.setAttribute('disabled','');
  const exp=document.getElementById(`exp-${mi}-${ei}`);
  exp.classList.remove('hidden');
  let txt = ok ? ('✅ '+t('correct')) : ('❌ '+t('incorrect')+' '+t('correctWas')+' '+e.accept[0]);
  exp.innerHTML = txt + ' ' + (e.exp?e.exp[lang]:'');
}
function markDone(mi){
  const u=currentUser(); const p=u.progress[st.domain]; p.modules=p.modules||{};
  p.modules[mi]=true; saveUser(u); toast(t('moduleDone')); renderModules();
}
function retest(){ st.view='test'; st.answers={}; st.submitted=false; render(); }

/* ============ boot ============ */
setLang(lang);
</script>
</body>
</html>
