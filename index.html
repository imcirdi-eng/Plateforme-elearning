<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>SkillUp — Plateforme d'entraînement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fff5fb; --bg2:#fdeef8; --card:#ffffff; --card2:#fdf0f9;
    --accent:#ff6fb5; --accent2:#a45cff; --ok:#1fb98a; --warn:#f59f3c; --err:#ff5c8a;
    --text:#4a2a52; --muted:#a886b8; --line:#f6d9ee; --radius:20px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Quicksand",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-weight:500;
    background:radial-gradient(1100px 650px at 85% -12%,#ffd9ef 0%,#f3e2ff 42%,#fff5fb 100%) fixed;color:var(--text);min-height:100vh}
  h1,h2,h3,.brand{font-family:"Poppins","Quicksand",sans-serif}
  .wrap{max-width:960px;margin:0 auto;padding:24px}
  header.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;letter-spacing:.3px}
  .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:grid;place-items:center;font-weight:900;color:#fff}
  .top-actions{display:flex;align-items:center;gap:10px}
  .lang{display:flex;background:var(--card);border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .lang button{background:none;border:none;color:var(--muted);padding:7px 12px;cursor:pointer;font-weight:700;font-size:13px}
  .lang button.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
  .who{font-size:13px;color:var(--muted)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:24px;margin-bottom:18px;
    box-shadow:0 14px 44px rgba(214,120,190,.18)}
  h1{font-size:26px;margin-bottom:8px}
  h2{font-size:20px;margin-bottom:6px}
  h3{font-size:16px;margin-bottom:6px}
  p.sub{color:var(--muted);margin-bottom:18px;line-height:1.5}
  label{display:block;font-size:13px;color:var(--muted);margin:12px 0 6px}
  input{width:100%;padding:12px 14px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;color:var(--text);font-size:15px}
  input:focus{outline:none;border-color:var(--accent)}
  button.btn{appearance:none;border:none;cursor:pointer;font-weight:700;font-size:15px;padding:12px 18px;border-radius:12px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;transition:.15s transform}
  button.btn:hover{transform:translateY(-1px)}
  button.btn.full{width:100%;margin-top:18px}
  button.ghost{background:var(--card2);color:var(--text);border:1px solid var(--line)}
  .link{color:var(--accent);cursor:pointer;font-weight:600}
  .muted{color:var(--muted)}
  .msg{font-size:13px;margin-top:10px;min-height:16px}
  .msg.err{color:var(--err)} .msg.ok{color:var(--ok)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .domain{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:18px;cursor:pointer;transition:.15s;position:relative}
  .domain:hover{border-color:var(--accent);transform:translateY(-2px)}
  .domain .ic{font-size:26px;margin-bottom:10px}
  .domain h3{margin-bottom:4px}
  .domain small{color:var(--muted)}
  .badge{display:inline-block;font-size:11px;font-weight:800;padding:4px 9px;border-radius:999px;margin-top:10px}
  .badge.none{background:#f7e3f2;color:var(--muted)}
  .badge.deb{background:rgba(245,165,36,.16);color:var(--warn)}
  .badge.int{background:rgba(39,192,138,.16);color:var(--ok)}
  .bar{height:7px;background:var(--bg2);border-radius:999px;overflow:hidden;margin-top:12px}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .q{margin-bottom:18px}
  .q .opt{display:block;width:100%;text-align:left;background:var(--bg2);border:1px solid var(--line);border-radius:12px;
    padding:13px 15px;margin-top:9px;cursor:pointer;color:var(--text);font-size:15px;transition:.12s}
  .q .opt:hover{border-color:var(--accent)}
  .q .opt.sel{border-color:var(--accent);background:rgba(255,111,181,.14)}
  .q .opt.correct{border-color:var(--ok);background:rgba(39,192,138,.14)}
  .q .opt.wrong{border-color:var(--err);background:rgba(255,92,122,.14)}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .spacer{flex:1}
  .pill{font-size:12px;font-weight:700;color:var(--muted);background:var(--bg2);padding:6px 11px;border-radius:999px;border:1px solid var(--line)}
  .lesson{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:16px;margin:12px 0;line-height:1.6}
  .lesson ul{margin:8px 0 0 18px} .lesson li{margin:4px 0}
  .module{border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;background:var(--card2)}
  .module .mhead{display:flex;align-items:center;gap:10px;cursor:pointer}
  .check{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;font-size:12px;flex-shrink:0}
  .check.done{background:var(--ok);border-color:var(--ok);color:#06231a}
  .result-big{text-align:center;padding:14px 0}
  .result-big .score{font-size:46px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .hidden{display:none!important}
  .expl{font-size:13px;color:var(--muted);margin-top:8px;padding-left:4px;border-left:2px solid var(--accent)}
  footer{ text-align:center;color:var(--muted);font-size:12px;padding:18px 0 30px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--line);
    padding:12px 18px;border-radius:12px;font-size:14px;opacity:0;transition:.3s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand"><div class="logo">S</div> SkillUp</div>
    <div class="top-actions">
      <span class="who" id="who"></span>
      <div class="lang">
        <button id="lfr" class="active" onclick="setLang('fr')">FR</button>
        <button id="len" onclick="setLang('en')">EN</button>
      </div>
      <button id="logoutBtn" class="btn ghost hidden" style="padding:7px 12px;font-size:13px" onclick="logout()"></button>
    </div>
  </header>

  <!-- GATE (code d'accès) -->
  <section id="view-gate"></section>

  <!-- AUTH -->
  <section id="view-auth"></section>

  <!-- DASHBOARD -->
  <section id="view-dash" class="hidden"></section>

  <!-- TEST -->
  <section id="view-test" class="hidden"></section>

  <!-- MODULES -->
  <section id="view-modules" class="hidden"></section>

  <footer>SkillUp · <span id="foot"></span></footer>
</div>
<div class="toast" id="toast"></div>

               en:"A <b>variable</b> stores a value under a name. Common types: <b>number</b> (42), <b>string</b> (\"hello\"), <b>boolean</b> (true/false). Example: <code>age = 30</code>."},
       ex:[{q:{fr:"\"Paris\" est de type :",en:"\"Paris\" is of type:"},o:["Nombre / Number","Texte (string) / String","Booléen / Boolean","Fonction / Function"],a:1,exp:{fr:"Entre guillemets = chaîne de caractères.",en:"In quotes = a string."}},
           {q:{fr:"true / false est un :",en:"true / false is a:"},o:["String","Booléen / Boolean","Nombre / Number","Tableau / Array"],a:1,exp:{fr:"Deux valeurs logiques : le booléen.",en:"Two logical values: a boolean."}}]},

       ex:[{q:{fr:"add(4,5) renvoie :",en:"add(4,5) returns:"},o:["9","45","20","Erreur / Error"],a:0,exp:{fr:"La fonction additionne : 4+5 = 9.",en:"The function adds: 4+5 = 9."}}]}

/* ============ Storage / auth (prototype) ============ */
const DB = {
  users(){ return JSON.parse(localStorage.getItem('su_users')||'{}'); },
  saveUsers(u){ localStorage.setItem('su_users',JSON.stringify(u)); },
  session(){ return localStorage.getItem('su_session'); },
  setSession(e){ e?localStorage.setItem('su_session',e):localStorage.removeItem('su_session'); }
};
// lightweight hash (prototype only — not cryptographic)
function hash(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h+s.charCodeAt(i))>>>0;return ''+h;}
function currentUser(){ const e=DB.session(); if(!e) return null; return DB.users()[e]||null; }
function saveUser(u){ const all=DB.users(); all[u.email]=u; DB.saveUsers(all); }

/* ============ App state ============ */
let st = { domain:null };

function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}
function show(id){['view-gate','view-auth','view-dash','view-test','view-modules'].forEach(v=>document.getElementById(v).classList.toggle('hidden',v!==id));}
function gatePassed(){ return localStorage.getItem('su_gate_ok')==='1'; }

/* ============ Render dispatcher ============ */
function render(){
  document.getElementById('foot').textContent = t('securityNote');
  const u=currentUser();
  const lo=document.getElementById('logoutBtn');
  lo.textContent=t('logout');
  lo.classList.toggle('hidden',!u);
  document.getElementById('who').textContent = u ? (t('welcome')+', '+u.name) : '';
  if(!u){
    if(!gatePassed()){ renderGate(); show('view-gate'); return; }
    renderAuth(); show('view-auth'); return;
  }
  if(st.view==='test'){ renderTest(); show('view-test'); }
  else if(st.view==='modules'){ renderModules(); show('view-modules'); }
  else { renderDash(); show('view-dash'); }
}

/* ============ Gate view (code d'accès) ============ */
function renderGate(){
  const v=document.getElementById('view-gate');
  v.innerHTML=`
   <div class="card" style="max-width:420px;margin:40px auto;text-align:center">
     <div class="logo" style="width:54px;height:54px;border-radius:16px;margin:0 auto 14px;font-size:24px">🔒</div>
     <h1>${t('gateTitle')}</h1>
     <p class="sub">${t('gateSub')}</p>
     <input id="g-code" placeholder="••••••" style="text-align:center;letter-spacing:2px;font-weight:700"
       onkeydown="if(event.key==='Enter')submitGate()">
     <div class="msg err" id="gate-msg"></div>
     <button class="btn full" onclick="submitGate()">${t('gateBtn')}</button>
   </div>`;
  setTimeout(()=>{const el=document.getElementById('g-code');el&&el.focus&&el.focus();},0);
}
function submitGate(){
  const val=(document.getElementById('g-code').value||'').trim();
  if(val.toUpperCase()===ACCESS_CODE.toUpperCase()){
    localStorage.setItem('su_gate_ok','1'); render();
  } else {
    document.getElementById('gate-msg').textContent=t('gateErr');
  }
}

/* ============ Auth view ============ */
let authMode='login';
function renderAuth(){
  const v=document.getElementById('view-auth');
  v.innerHTML=`
   <div class="card" style="max-width:440px;margin:30px auto">
     <h1>${authMode==='login'?t('login'):t('signup')}</h1>
     <p class="sub">${t('tagline')}</p>
     ${authMode==='signup'?`<label>${t('name')}</label><input id="f-name" autocomplete="given-name">`:''}
     <label>${t('email')}</label><input id="f-email" type="email" autocomplete="email">
     <label>${t('pwd')}</label><input id="f-pwd" type="password" autocomplete="current-password">
     <div class="msg err" id="auth-msg"></div>
     <button class="btn full" onclick="submitAuth()">${authMode==='login'?t('login'):t('signup')}</button>
     <p class="sub" style="margin-top:16px;text-align:center">
       ${authMode==='login'?t('noAccount'):t('haveAccount')}
       <span class="link" onclick="toggleAuth()">${authMode==='login'?t('signupNow'):t('loginNow')}</span>
     </p>
   </div>`;
}
function toggleAuth(){ authMode=authMode==='login'?'signup':'login'; renderAuth(); }
function submitAuth(){
  const email=(document.getElementById('f-email').value||'').trim().toLowerCase();
  const pwd=document.getElementById('f-pwd').value||'';
  const msg=document.getElementById('auth-msg');
  if(!email||!pwd||(authMode==='signup'&&!document.getElementById('f-name').value.trim())){msg.textContent=t('fillAll');return;}
  if(authMode==='signup'){
    if(pwd.length<6){msg.textContent=t('pwdShort');return;}
    const all=DB.users(); if(all[email]){msg.textContent=t('emailUsed');return;}
    const name=document.getElementById('f-name').value.trim();
    saveUser({email,name,pwd:hash(pwd),progress:{}});
    DB.setSession(email);
  } else {
    const u=DB.users()[email];
    if(!u||u.pwd!==hash(pwd)){msg.textContent=t('badLogin');return;}
    DB.setSession(email);
  }
  st={domain:null,view:'dash'}; render();
}
function logout(){ DB.setSession(null); st={domain:null}; render(); }

/* ============ Dashboard ============ */
function renderDash(){
  const u=currentUser();
  const v=document.getElementById('view-dash');
  let cards='';
  for(const key in DOMAINS){
    const d=DOMAINS[key]; const p=u.progress[key];
    let badge=`<span class="badge none">${t('notTested')}</span>`, barHtml='', cta=t('startTest');
    if(p&&p.level){
      const lvl = p.level==='beginner'?t('levelBeginner'):t('levelInter');
      const cls = p.level==='beginner'?'deb':'int';
      badge=`<span class="badge ${cls}">${t('level')}: ${lvl}</span>`;
      const pct=moduleProgress(key,p.level);
      barHtml=`<div class="bar"><i style="width:${pct}%"></i></div><small class="muted">${t('progress')}: ${pct}%</small>`;
      cta=t('openModules');
    }
    cards+=`<div class="domain" onclick="enterDomain('${key}')">
       <div class="ic">${d.ic}</div>
       <h3>${d.name[lang]}</h3><small>${d.desc[lang]}</small><br>${badge}${barHtml}
     </div>`;
  }
  v.innerHTML=`<div class="card">
     <h1>${t('welcome')}, ${u.name} 👋</h1>
     <p class="sub">${t('chooseDomain')}</p>
     <div class="grid">${cards}</div>
   </div>`;
}
function enterDomain(key){
  st.domain=key; const u=currentUser(); const p=u.progress[key];
  if(p&&p.level){ st.view='modules'; } else { st.view='test'; st.answers={}; st.submitted=false; }
  render();
}

/* ============ Test view ============ */
function renderTest(){
  const key=st.domain, d=DOMAINS[key], qs=TESTS[key];
  st.answers=st.answers||{};
  const v=document.getElementById('view-test');
  let body='';
  qs.forEach((item,i)=>{
    let opts='';
    item.o.forEach((o,j)=>{
      let cls='opt';
      if(st.submitted){ if(j===item.a)cls+=' correct'; else if(st.answers[i]===j)cls+=' wrong'; }
      else if(st.answers[i]===j)cls+=' sel';
      opts+=`<button class="${cls}" ${st.submitted?'disabled':''} onclick="pick(${i},${j})">${o}</button>`;
    });
    body+=`<div class="q"><b>${t('q')} ${i+1}.</b> ${item.q[lang]}${opts}</div>`;
  });
  let footer;
  if(st.submitted){
    const sc=scoreTest(); const lvl=sc.pct>=60?'intermediate':'beginner';
    footer=`<div class="result-big">
       <div class="score">${sc.correct}/${sc.total}</div>
       <p class="sub">${t('yourScore')} — ${sc.pct}%</p>
       <span class="badge ${lvl==='beginner'?'deb':'int'}" style="font-size:14px">${t('level')}: ${lvl==='beginner'?t('levelBeginner'):t('levelInter')}</span>
       <p class="sub" style="margin-top:14px">${lvl==='beginner'?t('resultBeginnerMsg'):t('resultInterMsg')}</p>
       <button class="btn" onclick="finishTest()">${t('seeModules')}</button>
     </div>`;
  } else {
    footer=`<button class="btn full" onclick="submitTest()">${t('validate')}</button>`;
  }
  v.innerHTML=`<div class="card">
     <div class="row"><span class="pill">${d.ic} ${d.name[lang]}</span><div class="spacer"></div>
       <span class="link" onclick="goDash()">← ${t('back')}</span></div>
     <h1 style="margin-top:14px">${t('testTitle')}</h1>
     <p class="sub">${d.desc[lang]}</p>${body}${footer}</div>`;
}
function pick(i,j){ if(st.submitted)return; st.answers[i]=j; renderTest(); }
function scoreTest(){ const qs=TESTS[st.domain]; let c=0; qs.forEach((it,i)=>{if(st.answers[i]===it.a)c++;});
  return {correct:c,total:qs.length,pct:Math.round(c/qs.length*100)}; }
function submitTest(){
  const qs=TESTS[st.domain];
  if(Object.keys(st.answers).length<qs.length){ toast(t('answerAll')); return; }
  st.submitted=true; renderTest();
}
function finishTest(){
  const sc=scoreTest(); const lvl=sc.pct>=60?'intermediate':'beginner';
  const u=currentUser(); u.progress[st.domain]={level:lvl,score:sc.pct,modules:{}}; saveUser(u);
  st.view='modules'; render();
}
function goDash(){ st.view='dash'; st.domain=null; render(); }

/* ============ Modules view ============ */
function moduleProgress(key,level){
  const u=currentUser(); const p=u.progress[key]; if(!p)return 0;
  const mods=MODULES[key][level]; const done=p.modules?Object.values(p.modules).filter(Boolean).length:0;
  return Math.round(done/mods.length*100);
}
function renderModules(){
  const key=st.domain, d=DOMAINS[key], u=currentUser(), p=u.progress[key];
  const level=p.level, mods=MODULES[key][level];
  const v=document.getElementById('view-modules');
  let list='';
  mods.forEach((m,mi)=>{
    const done=p.modules&&p.modules[mi];
    let ex='';
    m.ex.forEach((e,ei)=>{
      let opts='';
      e.o.forEach((o,j)=>{ opts+=`<button class="opt" onclick="answerEx(${mi},${ei},${j})" id="ex-${mi}-${ei}-${j}">${o}</button>`; });
      ex+=`<div class="q" style="margin-top:14px"><b>${e.q[lang]}</b>${opts}<div class="expl hidden" id="exp-${mi}-${ei}"></div></div>`;
    });
    list+=`<div class="module">
       <div class="mhead" onclick="toggleModule(${mi})">
         <div class="check ${done?'done':''}" id="chk-${mi}">${done?'✓':''}</div>
         <h3 style="margin:0">${m.title[lang]}</h3>
       </div>
       <div id="mbody-${mi}" class="${st.openModule===mi?'':'hidden'}">
         <div class="lesson"><b>${t('lesson')}</b><br>${m.lesson[lang]}</div>
         <h3>${t('practice')}</h3>${ex}
         <button class="btn ghost" style="margin-top:14px" onclick="markDone(${mi})">${done?('✓ '+t('done')):t('markDone')}</button>
       </div>
     </div>`;
  });
  const lvlLabel = level==='beginner'?t('levelBeginner'):t('levelInter');
  v.innerHTML=`<div class="card">
     <div class="row"><span class="pill">${d.ic} ${d.name[lang]}</span>
       <span class="badge ${level==='beginner'?'deb':'int'}">${t('level')}: ${lvlLabel}</span>
       <div class="spacer"></div><span class="link" onclick="goDash()">← ${t('back')}</span></div>
     <h1 style="margin-top:14px">${t('modulesOf')} — ${d.name[lang]}</h1>
     <div class="bar" style="max-width:320px"><i style="width:${moduleProgress(key,level)}%"></i></div>
     <p class="sub">${t('progress')}: ${moduleProgress(key,level)}%</p>
     ${list}
     <div class="row" style="margin-top:6px">
       <button class="btn ghost" onclick="retest()">↻ ${t('retest')}</button>
     </div>
   </div>`;
}
function toggleModule(mi){ st.openModule = st.openModule===mi?null:mi; renderModules(); }
function answerEx(mi,ei,j){
  const e=MODULES[st.domain][currentUser().progress[st.domain].level][mi].ex[ei];
  for(let k=0;k<e.o.length;k++){
    const el=document.getElementById(`ex-${mi}-${ei}-${k}`); if(!el)continue;
    el.classList.remove('correct','wrong');
    if(k===e.a)el.classList.add('correct'); else if(k===j)el.classList.add('wrong');
    el.setAttribute('disabled','');
  }
  const exp=document.getElementById(`exp-${mi}-${ei}`);
  exp.classList.remove('hidden');
  exp.innerHTML=(j===e.a?('✅ '+t('correct')):('❌ '+t('incorrect')))+' '+(e.exp?e.exp[lang]:'');
}
function markDone(mi){
  const u=currentUser(); const p=u.progress[st.domain]; p.modules=p.modules||{};
  p.modules[mi]=true; saveUser(u); toast(t('moduleDone')); renderModules();
}
function retest(){ st.view='test'; st.answers={}; st.submitted=false; render(); }

/* ============ boot ============ */
setLang(lang);
</script>
